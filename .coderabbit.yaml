# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for policies-and-standards (documentation KB).
# Gate G — AI review as validator (STD-030).

language: en-US

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  poem: false
  review_status: true
  commit_status: true
  fail_commit_status: true
  sequence_diagrams: false
  assess_linked_issues: true
  enable_prompt_for_ai_agents: true

  auto_review:
    enabled: true
    drafts: true
    ignore_title_keywords:
      - WIP
      - DO NOT MERGE

  path_filters:
    - "!.quint/**"
    - "!.coderabbit/**"
    - "!**/node_modules/**"
    - "!**/*.lock"
    - "!**/fixtures/**"

  path_instructions:
    - path: "**/*.md"
      instructions: |
        This is a governed documentation repository (policies-and-standards).
        All governed documents MUST have YAML frontmatter with: id, title,
        version, category, status, owner, reviewer, approver, last_updated,
        extends, tags. MUST follow the 7-section structure defined by STD-001:
        Purpose, Scope, Standard, Implementation Notes, Continuous Improvement
        and Compliance Metrics, Compliance, Changelog. Flag version decrements.
        Flag missing changelog entries when version is bumped. ATX-style
        headings only (# not ===). Cross-references MUST use standard
        relative markdown links. Flag broken relative links.
        EXEMPT: Files under .coderabbit/ are CodeRabbit configuration, not
        governed documents — do not flag them for missing frontmatter or
        section structure.
    - path: "06_Projects/Templates/**"
      instructions: |
        Template files. The id field in frontmatter MUST use TPL- prefix.
        Flag missing placeholder markers (angle-bracket tokens like
        <project-name>). Verify that instructions to the template user are
        clearly separated from template content.
    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions workflows. Actions MUST be pinned to SHA or major
        version tag — flag unpinned actions (e.g., @main without SHA).
        No hardcoded secrets or tokens. Shell scripts MUST use
        set -euo pipefail. Flag any use of --no-verify, --force, or
        --force-with-lease.

  tools:
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true
    gitleaks:
      enabled: true
    ruff:
      enabled: false
    eslint:
      enabled: false
    biome:
      enabled: false

knowledge_base:
  code_guidelines:
    enabled: true
  learnings:
    scope: local
  web_search:
    enabled: true

chat:
  auto_reply: true
