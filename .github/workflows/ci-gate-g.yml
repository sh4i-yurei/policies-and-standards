# Gate G — AI commit attribution check (STD-030).
# Calls the reusable gate-g-attribution workflow.
# CodeRabbit auto-review is handled by the GitHub App, not this workflow.

name: Gate G

on:
  pull_request:
    branches: [main]

jobs:
  attribution:
    uses: ./.github/workflows/gate-g-attribution.yml
    with:
      blocking: false
