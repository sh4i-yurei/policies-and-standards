# Local caller for the reusable auto-approve workflow.
# Triggers on review submissions and PR updates, then delegates to
# the shared workflow that checks threads + CI before approving.

name: Auto Approve

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [synchronize]

jobs:
  approve:
    uses: ./.github/workflows/auto-approve.yml
    permissions:
      pull-requests: write
      checks: read
      statuses: read
