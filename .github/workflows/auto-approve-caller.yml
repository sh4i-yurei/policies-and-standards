# Local caller for the reusable auto-approve workflow.
# Triggers on review submissions, then delegates to the shared
# workflow that checks threads before approving. Only fires on
# pull_request_review (not synchronize) so approval waits until
# a reviewer has actually reviewed the current code.

name: Auto Approve

on:
  pull_request_review:
    types: [submitted]
    branches: [main]

jobs:
  approve:
    uses: ./.github/workflows/auto-approve.yml
    permissions:
      pull-requests: write
