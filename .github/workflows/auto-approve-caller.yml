# Local caller for the reusable auto-approve workflow.
# Triggers on review submissions and PR updates, then delegates to
# the shared workflow that checks threads before approving.

name: Auto Approve

on:
  pull_request_review:
    types: [submitted]
    branches: [main]
  pull_request:
    types: [synchronize]
    branches: [main]

jobs:
  approve:
    uses: ./.github/workflows/auto-approve.yml
    permissions:
      pull-requests: write
