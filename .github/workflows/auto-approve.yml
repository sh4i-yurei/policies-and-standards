# Reusable auto-approve workflow.
#
# Approves PRs when a reviewer has submitted at least one review AND all
# review threads are resolved (or outdated). Copilot code review only
# submits COMMENTED state (by design), so this provides the APPROVED
# review required by branch protection.
#
# Why both pull_request_review AND synchronize triggers?
#   - pull_request_review [submitted] fires when a reviewer posts, but
#     GitHub gates bot-triggered runs as "action_required" (no opt-out).
#     Copilot's reviews are bot-triggered, so that event never runs.
#   - pull_request [synchronize] fires on each push — triggered by the
#     human pusher, so it runs without gating. The "has review" guard
#     below prevents approving before any reviewer has looked at the code.
#   - required_conversation_resolution in branch protection is the final
#     safety net — even if auto-approve fires, unresolved threads block merge.
#
# Caller repos must:
#   1. Create a caller workflow that triggers on pull_request_review
#      [submitted] AND pull_request [synchronize]
#      (see 06_Projects/Templates/ci/auto-approve-caller.yml)
#   2. Enable repo setting: can_approve_pull_request_reviews = true
#      (Settings > Actions > General > "Allow GitHub Actions to create
#      and approve pull requests")

name: "Auto Approve"

on:
  workflow_call:

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check review threads and approve
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request
              ?? (await github.rest.pulls.get({
                   owner: context.repo.owner,
                   repo: context.repo.repo,
                   pull_number: context.issue.number
                 })).data;

            // 1. Query all review threads via GraphQL
            const { repository } = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      pageInfo { hasNextPage }
                      nodes {
                        isResolved
                        isOutdated
                        comments(first: 1) {
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: pr.number,
            });

            const reviewThreads = repository.pullRequest.reviewThreads;
            if (reviewThreads.pageInfo.hasNextPage) {
              console.log('Too many review threads to check — skipping approval');
              return;
            }

            const threads = reviewThreads.nodes;
            const unresolvedThreads = threads.filter(t =>
              !t.isResolved && !t.isOutdated
            );

            if (unresolvedThreads.length > 0) {
              console.log(`${unresolvedThreads.length} unresolved thread(s) — skipping approval`);
              return;
            }

            // 2. Require at least one review before approving.
            //    Prevents the synchronize trigger from approving on the
            //    initial push before Copilot (or any reviewer) has looked.
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const hasReview = reviews.some(r =>
              r.user?.login !== 'github-actions[bot]'
            );

            if (!hasReview) {
              console.log('No reviews submitted yet — skipping approval');
              return;
            }

            // 3. Check if already approved by github-actions[bot]
            const hasApproval = reviews.some(r =>
              r.user?.login === 'github-actions[bot]' && r.state === 'APPROVED'
            );

            if (hasApproval) {
              console.log('Already approved — skipping');
              return;
            }

            // 4. All clear — approve
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'All review threads resolved. Branch protection enforces CI.',
            });

            console.log('PR approved by github-actions[bot]');
