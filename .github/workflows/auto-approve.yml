# Auto-approve PRs after all review threads are resolved and CI passes.
# Copilot code review only submits COMMENTED state (by design), so this
# workflow provides the APPROVED review required by branch protection.
# Requires repo setting: can_approve_pull_request_reviews = true

name: "Auto Approve"

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [synchronize]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check review threads and approve
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
              ?? (await github.rest.pulls.get({
                   owner: context.repo.owner,
                   repo: context.repo.repo,
                   pull_number: context.issue.number
                 })).data;

            // 1. Query all review threads via GraphQL
            const { repository } = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        isOutdated
                        comments(first: 1) {
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: pr.number,
            });

            const threads = repository.pullRequest.reviewThreads.nodes;
            const unresolvedThreads = threads.filter(t =>
              !t.isResolved && !t.isOutdated
            );

            if (unresolvedThreads.length > 0) {
              console.log(`${unresolvedThreads.length} unresolved thread(s) — skipping approval`);
              return;
            }

            // 2. Check required status checks
            const { data: checks } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });

            if (checks.state !== 'success') {
              console.log(`Combined status: ${checks.state} — skipping approval`);
              return;
            }

            // 3. Check if already approved by github-actions[bot]
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const hasApproval = reviews.some(r =>
              r.user.login === 'github-actions[bot]' && r.state === 'APPROVED'
            );

            if (hasApproval) {
              console.log('Already approved — skipping');
              return;
            }

            // 4. All clear — approve
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'All review threads resolved and status checks passing.',
            });

            console.log('PR approved by github-actions[bot]');
