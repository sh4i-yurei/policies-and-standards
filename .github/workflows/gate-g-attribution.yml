name: "Gate G - AI Commit Attribution"

on:
  workflow_call:
    inputs:
      blocking:
        description: "Whether missing attribution blocks merge"
        required: false
        type: boolean
        default: false

jobs:
  attribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check AI commit attribution
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::Checking PR commits for AI attribution"

          # Fetch PR commits via API (handles squash/rebase accurately)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          COMMITS=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/commits" \
            --jq '.[].sha')

          TOTAL=0
          MISSING=0
          MISSING_LIST=""

          for SHA in $COMMITS; do
            TOTAL=$((TOTAL + 1))
            MSG=$(git log -1 --format='%B' "$SHA")

            # Check for Co-Authored-By with known AI patterns
            if echo "$MSG" | grep -qiE 'co-authored-by:.*\b(claude|copilot|gpt|openai|anthropic|cursor|gemini)\b'; then
              echo "✓ ${SHA:0:8} — AI attribution found"
            else
              MISSING=$((MISSING + 1))
              MISSING_LIST="${MISSING_LIST}\n  - ${SHA:0:8}: $(git log -1 --format='%s' "$SHA")"
              echo "⚠ ${SHA:0:8} — no AI attribution detected"
            fi
          done

          echo "::endgroup::"
          echo ""
          echo "## Results"
          echo "Commits checked: ${TOTAL}"
          echo "Missing attribution: ${MISSING}"

          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "::warning::${MISSING} commit(s) without AI attribution:${MISSING_LIST}"
            echo ""
            echo "Expected: Co-Authored-By header with AI tool name"
            echo "(e.g., Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>)"

            if [ "${{ inputs.blocking }}" = "true" ]; then
              echo "::error::Blocking mode — attribution required"
              exit 1
            fi
          else
            echo "✓ All commits have AI attribution"
          fi
