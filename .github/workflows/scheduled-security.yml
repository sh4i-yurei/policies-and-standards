name: "Scheduled Security Scan"

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6:00 UTC
  workflow_dispatch: {}
  workflow_call: {}

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4

  notify:
    needs: codeql
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    permissions:
      issues: write
    with:
      gate-name: "Scheduled Security Scan"
      error-summary: >-
        Weekly CodeQL scan detected issues. Check the run
        logs for details on newly disclosed CVEs.
