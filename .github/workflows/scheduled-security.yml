name: "Scheduled Security Scan"

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6:00 UTC
  workflow_dispatch:
    inputs:
      language:
        description: "CodeQL language to analyze"
        required: false
        default: "python"
        type: string
  workflow_call:
    inputs:
      language:
        description: "CodeQL language to analyze"
        required: false
        type: string
        default: "python"

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.language || 'python' }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4

  notify:
    needs: codeql
    if: failure()
    uses: ./.github/workflows/notify-on-failure.yml
    permissions:
      issues: write
    with:
      gate-name: "Scheduled Security Scan"
      error-summary: >-
        Weekly CodeQL scan detected issues. Check the run
        logs for details on newly disclosed CVEs.
