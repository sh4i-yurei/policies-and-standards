name: Auto-label PRs

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@9fcb2c2fdd19f6644e3b55b277f9e6bbf3b2494b # v5.0.0
        with:
          sync-labels: false
