# Request Copilot Review
#
# Explicitly requests Copilot as a reviewer on every PR push.
# Without this, the review_on_push ruleset may not trigger Copilot
# to review at all (~30% miss rate). No review means auto-approve
# has nothing to act on, and PRs stay merge-blocked.
#
# Identity note: `@copilot` is the documented gh CLI alias for
# requesting Copilot code review. The bot that posts reviews appears
# as `copilot-pull-request-reviewer[bot]`. These are the same service
# — GitHub maps the @copilot request to the bot identity.
#
# Flow: push → this workflow requests review → Copilot reviews →
#       auto-approve.yml fires on pull_request_review [submitted]

name: Request Copilot Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  request-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Requesting Copilot review for PR #${{ github.event.pull_request.number }}"
          if ! gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-reviewer @copilot; then
            echo "::warning::Failed to request Copilot review — may need manual request"
          fi
