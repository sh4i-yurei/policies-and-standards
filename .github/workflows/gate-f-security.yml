name: "Gate F - Security Baseline"

on:
  workflow_call:
    inputs:
      blocking:
        description: "Whether security findings block merge"
        required: false
        type: boolean
        default: false
      codeql-language:
        description: "CodeQL language to analyze"
        required: false
        type: string
        default: "python"

jobs:
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
    continue-on-error: ${{ !inputs.blocking }}
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.codeql-language || 'python' }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4

  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: ${{ !inputs.blocking }}
    steps:
      - uses: actions/checkout@v6
      - name: Dependency review
        uses: actions/dependency-review-action@v4
