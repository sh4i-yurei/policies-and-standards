# Auto Approve Caller Template
#
# Copy this file to .github/workflows/auto-approve.yml in your project repo.
#
# Prerequisites:
#   Settings > Actions > General > "Allow GitHub Actions to create and
#   approve pull requests" must be checked. Or via API:
#     gh api repos/OWNER/REPO/actions/permissions/workflow -X PUT \
#       -F can_approve_pull_request_reviews=true
#
# This calls the reusable auto-approve workflow in policies-and-standards.
# The workflow approves PRs when a reviewer has submitted at least one
# review AND all review threads are resolved.
#
# Two triggers needed because GitHub gates bot-triggered runs
# (Copilot reviews) as "action_required" with no opt-out. The
# synchronize trigger fires as the human pusher, bypassing the gate.
# The reusable workflow guards against premature approval (requires
# at least one review before approving).

name: Auto Approve

on:
  pull_request_review:
    types: [submitted]
    branches: [main]
  pull_request:
    types: [synchronize]
    branches: [main]

jobs:
  approve:
    uses: sh4i-yurei/policies-and-standards/.github/workflows/auto-approve.yml@main
    permissions:
      pull-requests: write
